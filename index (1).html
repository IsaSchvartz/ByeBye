<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital - Verano 2027</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <h1>CATÁLOGO DIGITAL</h1>
                <p class="tagline">Colección Verano 2027</p>
            </div>
            <div class="header-right">
                <button class="cart-button" id="cartBtn" title="Mi Selección">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="9" cy="21" r="1"/>
                        <circle cx="20" cy="21" r="1"/>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                    <span id="cartCount" class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- NAVEGACIÓN JERÁRQUICA -->
        <nav class="navigation">
            <div id="navLevel1" class="nav-level">
                <!-- Nivel 1: Colecciones -->
            </div>
            <div id="navLevel2" class="nav-level" style="display: none;">
                <!-- Nivel 2: Género -->
            </div>
            <div id="navLevel3" class="nav-level" style="display: none;">
                <!-- Nivel 3: Categorías -->
            </div>
        </nav>

        <!-- BREADCRUMB -->
        <div class="breadcrumb" id="breadcrumb">
            <span>Inicio</span>
        </div>

        <!-- PRODUCTOS GRID -->
        <main class="main-content">
            <div id="productsContainer" class="products-container">
                <!-- Se carga dinámicamente -->
            </div>
        </main>
    </div>

    <!-- MODAL DE PRODUCTO -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-body">
                <div class="modal-gallery">
                    <img id="mainImage" src="" alt="Producto">
                    <div class="gallery-thumbnails" id="galleryThumbs"></div>
                </div>
                <div class="modal-info">
                    <h2 id="modalName"></h2>
                    <p id="modalDescription" class="modal-description"></p>
                    
                    <div class="product-meta">
                        <div class="meta-item">
                            <label>Colección</label>
                            <p id="modalCollection"></p>
                        </div>
                        <div class="meta-item">
                            <label>Categoría</label>
                            <p id="modalCategory"></p>
                        </div>
                    </div>

                    <button id="addToSelectionBtn" class="btn btn-primary">
                        Añadir a Mi Selección
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CARRITO LATERAL -->
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Mi Selección</h2>
            <button id="closeCart" class="close-cart">&times;</button>
        </div>
        <div id="cartItems" class="cart-items">
            <!-- Se carga dinámicamente -->
        </div>
        <div id="emptyCart" class="empty-cart">
            <p>Tu selección está vacía</p>
        </div>
        <div class="cart-footer">
            <button id="downloadPdfBtn" class="btn btn-primary" style="display: none;">
                Descargar PDF y Cotizar
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" class="overlay"></div>

    <!-- SCRIPTS -->
    <script src="script.js"></script>
</body>
</html>
